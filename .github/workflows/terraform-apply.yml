name: Terraform Apply

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: us-east-1
      TF_VAR_database_password: ${{ secrets.DATABASE_PASSWORD }}
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify remote Terraform backend
        run: |
          if ! grep -Eq '^[[:space:]]*backend "s3"' versions.tf; then
            echo "The apply workflow requires the S3 remote backend to be enabled in versions.tf."
            echo "Do not apply from GitHub Actions while Terraform state is local to the runner."
            exit 1
          fi

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
